<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>温度湿度数据</title>
</head>
<body>
    <div>
        <p>温度: <span id="tempVal">--</span> °C</p>
        <p>湿度: <span id="humVal">--</span> %</p>
        <p>状态: <span id="statusText">未连接</span></p>
    </div>

    <script>
        // 模拟数据更新（实际使用时替换为真实数据源）
        function updateData(temp, hum, status) {
            document.getElementById('tempVal').textContent = temp.toFixed(1);
            document.getElementById('humVal').textContent = hum.toFixed(1);
            document.getElementById('statusText').textContent = status;
        }

        // 模拟连接状态变化
        let isConnected = false;
        
        // 示例：每3秒更新一次随机数据（仅用于演示）
        setInterval(() => {
            const temp = 20 + Math.random() * 15; // 20-35°C
            const hum = 40 + Math.random() * 30;  // 40-70%
            
            // 模拟连接状态切换
            isConnected = !isConnected;
            const status = isConnected ? "已连接" : "未连接";
            
            updateData(temp, hum, status);
        }, 3000);

        // 初始显示
        updateData(24.5, 45.0, "未连接");
    </script>
</body>
</html>
