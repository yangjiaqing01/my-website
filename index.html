
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易 IoT 监控</title>
    <!-- 引入 TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Paho MQTT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full space-y-6">
        <!-- 标题与状态 -->
        <div class="text-center">
            <h1 class="text-2xl font-bold text-gray-800">传感器实时监控</h1>
            <p id="status" class="text-sm text-gray-500 mt-2">正在连接...</p>
        </div>

        <!-- 数据展示卡片 -->
        <div class="grid grid-cols-2 gap-4">
            <div class="card p-6 text-center">
                <div class="text-gray-500 text-sm mb-1">温度</div>
                <div class="text-4xl font-bold text-orange-500"><span id="temp">--</span>°C</div>
            </div>
            <div class="card p-6 text-center">
                <div class="text-gray-500 text-sm mb-1">湿度</div>
                <div class="text-4xl font-bold text-blue-500"><span id="hum">--</span>%</div>
            </div>
        </div>

        <!-- 日志区域 -->
        <div class="card p-4">
            <h3 class="text-xs font-bold text-gray-400 uppercase mb-2">实时日志</h3>
            <div id="logs" class="h-32 overflow-y-auto text-xs font-mono text-gray-600 space-y-1 bg-gray-50 p-2 rounded">
                <!-- 日志将在这里显示 -->
            </div>
        </div>
        
        <!-- 测试按钮 -->
        <button onclick="simulateData()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition">
            模拟接收一条数据
        </button>
    </div>

    <script>
        // 配置信息
        const HOST = "broker.emqx.io";
        const PORT = 8083; // WebSocket 端口
        const TOPIC = "test/sensor_data";
        
        let client;
        const logsDiv = document.getElementById('logs');
        const statusP = document.getElementById('status');

        // 添加日志
        function addLog(msg) {
            const div = document.createElement('div');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logsDiv.appendChild(div);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        // 初始化 MQTT
        function initMQTT() {
            client = new Paho.MQTT.Client(HOST, PORT, "web_client_" + Math.random().toString(16).substr(2, 8));
            
            client.onConnectionLost = (responseObject) => {
                statusP.innerText = "连接断开: " + responseObject.errorMessage;
                statusP.className = "text-sm text-red-500 mt-2";
                addLog("连接丢失");
            };

            client.onMessageArrived = (message) => {
                addLog("收到: " + message.payloadString);
                try {
                    const data = JSON.parse(message.payloadString);
                    if(data.temperature) document.getElementById('temp').innerText = data.temperature;
                    if(data.humidity) document.getElementById('hum').innerText = data.humidity;
                } catch(e) {
                    addLog("数据格式错误");
                }
            };

            const options = {
                timeout: 3,
                onSuccess: () => {
                    statusP.innerText = "已连接到 EMQX 公共服务器";
                    statusP.className = "text-sm text-green-600 mt-2";
                    addLog("连接成功，订阅主题: " + TOPIC);
                    client.subscribe(TOPIC);
                },
                onFailure: (message) => {
                    statusP.innerText = "连接失败: " + message.errorMessage;
                    statusP.className = "text-sm text-red-500 mt-2";
                    addLog("连接失败");
                }
            };
            
            addLog("正在连接...");
            client.connect(options);
        }

        // 模拟数据功能（用于测试网页是否正常）
        function simulateData() {
            const mockData = {
                temperature: (20 + Math.random() * 10).toFixed(1),
                humidity: (40 + Math.random() * 20).toFixed(1)
            };
            // 直接调用消息处理函数模拟接收
            client.onMessageArrived({
                destinationName: TOPIC,
                payloadString: JSON.stringify(mockData)
            });
        }

        // 页面加载后启动
        window.onload = initMQTT;
    </script>
</body>
</html>
